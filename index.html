<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTS Expert - Ultimate Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .line-flow { stroke-dasharray: 5; animation: flow 2s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -10; } }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-20 text-slate-900">

    <nav class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black tracking-tighter text-2xl uppercase text-yellow-400">PLTS<span class="text-white">EXPERT</span></h1>
                <p class="text-[9px] text-slate-400 font-bold tracking-[0.2em] mt-1 uppercase">Sistem Audit & Perencanaan Aman</p>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 mt-8 grid lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 flex justify-between items-center">
                    <span>📋 Daftar Perangkat Listrik</span>
                    <button onclick="addRow()" class="bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black hover:bg-yellow-500">+ ALAT</button>
                </h2>
                
                <div class="space-y-3 mb-6" id="loadContainer">
                    <div class="grid grid-cols-12 gap-2 load-row items-center border-b pb-3 border-slate-50">
                        <input type="text" placeholder="Nama Alat" class="col-span-5 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none">
                        <input type="number" placeholder="Watt" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold watt-val">
                        <input type="number" placeholder="Jam" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold hour-val">
                        <button onclick="this.parentElement.remove()" class="col-span-1 text-red-400 font-bold">×</button>
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-3 text-xs font-bold">
                        <div class="space-y-1">
                            <label class="text-slate-400 uppercase ml-2">Arus Output</label>
                            <select id="modeInput" class="w-full p-4 bg-slate-900 text-white rounded-2xl outline-none">
                                <option value="AC">Sistem AC (Inverter)</option>
                                <option value="DC">Sistem DC (Full DC)</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-slate-400 uppercase ml-2">Voltase Aki</label>
                            <select id="voltInput" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200">
                                <option value="12">12V</option>
                                <option value="24">24V</option>
                                <option value="48">48V</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Jenis Baterai</label>
                        <select id="batteryType" class="w-full p-4 bg-blue-50 text-blue-700 rounded-2xl font-bold text-xs border border-blue-100">
                            <option value="0.5">Aki GEL/VRLA (DoD 50%)</option>
                            <option value="0.8">LiFePO4 (DoD 80%)</option>
                        </select>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                        <label class="block text-[10px] font-bold text-amber-700 uppercase mb-2">Punya PV Sendiri? (WP Opsional)</label>
                        <input type="number" id="customPV" placeholder="Biarkan kosong untuk auto-WP" class="w-full p-3 bg-white border border-amber-200 rounded-xl font-bold text-sm">
                        <p class="text-[8px] text-amber-600 mt-2 italic">* Gunakan jika ingin cicil PV kecil untuk baterai besar.</p>
                    </div>

                    <button onclick="buildSystem()" class="w-full bg-yellow-400 text-slate-900 font-black py-5 rounded-2xl hover:bg-slate-900 hover:text-white transition-all uppercase tracking-tighter shadow-xl">
                        Rancang & Analisa ⚡
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div id="resultArea" class="hidden space-y-6">
                
                <div id="dangerAlert" class="bg-red-600 text-white p-6 rounded-[2rem] flex items-start gap-4 hidden">
                    <span class="text-3xl">⚠️</span>
                    <p id="dangerText" class="text-sm font-bold"></p>
                </div>

                <div id="chargeInfo" class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex items-center gap-6">
                    <div class="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center text-yellow-400 border-2 border-yellow-400 font-black text-2xl italic" id="resDays">1</div>
                    <div>
                        <h4 class="font-black text-slate-800">Hari Penjemuran</h4>
                        <p class="text-[10px] text-slate-400" id="daySub"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-900 rounded-[2rem] p-6 text-white text-center">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Total Kebutuhan Harian</p>
                        <h3 id="resWh" class="text-3xl font-black text-yellow-400">0 Wh</h3>
                        <p class="text-[9px] mt-2 opacity-50 italic">* Termasuk rugi sistem & Inverter</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-200 text-center">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-2 text-blue-600">Kapasitas Baterai</p>
                        <h3 id="resAh" class="text-3xl font-black text-blue-600 font-black">0 Ah</h3>
                        <p id="resKabel" class="text-[9px] mt-2 font-bold text-slate-300"></p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 text-center overflow-x-auto">
                    <svg viewBox="0 0 500 120" class="w-full min-w-[400px]">
                        <line x1="60" y1="60" x2="440" y2="60" stroke="#cbd5e1" stroke-width="2" class="line-flow"/>
                        <circle cx="60" cy="60" r="25" fill="#facc15"/><text x="60" y="64" font-size="8" font-weight="bold" text-anchor="middle">PV</text>
                        <circle cx="180" cy="60" r="25" fill="#1e293b"/><text x="180" y="64" font-size="8" font-weight="bold" text-anchor="middle" fill="white">SCC</text>
                        <circle cx="300" cy="60" r="25" fill="#2563eb"/><text x="300" y="64" font-size="8" font-weight="bold" text-anchor="middle" fill="white">BAT</text>
                        <circle cx="420" cy="60" r="25" fill="#9333ea"/><text x="420" y="64" font-size="8" font-weight="bold" text-anchor="middle" fill="white" id="outText">OUT</text>
                    </svg>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <h3 class="font-black text-lg mb-4">🛒 List Belanja Mandiri</h3>
                    <div id="shoppingList" class="grid gap-2"></div>
                </div>

            </div>

            <div id="placeholder" class="h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex items-center justify-center opacity-30 italic font-black text-slate-400">
                LAKUKAN AUDIT ENERGI DI KIRI
            </div>
        </div>
    </div>

    <script>
        function addRow() {
            const container = document.getElementById('loadContainer');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-2 load-row items-center border-b pb-3 border-slate-50";
            row.innerHTML = `<input type="text" placeholder="Nama Alat" class="col-span-5 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none">
                             <input type="number" placeholder="W" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold watt-val">
                             <input type="number" placeholder="J" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold hour-val">
                             <button onclick="this.parentElement.remove()" class="col-span-1 text-red-400 font-bold">×</button>`;
            container.appendChild(row);
        }

        function buildSystem() {
            const watts = document.querySelectorAll('.watt-val');
            const hours = document.querySelectorAll('.hour-val');
            let totalWhBase = 0;
            let totalInstantWatt = 0;

            watts.forEach((w, i) => {
                const vW = parseFloat(w.value) || 0;
                const vH = parseFloat(hours[i].value) || 0;
                totalWhBase += (vW * vH);
                totalInstantWatt += vW;
            });

            if (totalWhBase === 0) return alert("Isi daftar alat!");

            const mode = document.getElementById('modeInput').value;
            const volt = parseFloat(document.getElementById('voltInput').value);
            const dod = parseFloat(document.getElementById('batteryType').value);
            const customPV = parseFloat(document.getElementById('customPV').value) || 0;

            // Parameter Fix: Matahari 4 Jam, Efisiensi 0.85
            const sunTime = 4;
            const eff = 0.85;
            const loss = (mode === "AC") ? 1.15 : 1.05;

            const finalWh = Math.ceil(totalWhBase * loss);
            const ah = Math.ceil(finalWh / (volt * dod));
            
            // WP Logic
            const idealWP = Math.ceil(finalWh / (sunTime * eff));
            const usedWP = customPV > 0 ? customPV : idealWP;
            const sccAmp = Math.ceil((usedWP / volt) * 1.25);

            // Hari Penjemuran
            const dailyProd = usedWP * sunTime * eff;
            const daysToCharge = Math.ceil(finalWh / dailyProd);

            // Security Logic
            const dangerAlert = document.getElementById('dangerAlert');
            dangerAlert.classList.add('hidden');
            if (volt == 12 && (totalInstantWatt > 500 || finalWh > 1500)) {
                dangerAlert.classList.remove('hidden');
                document.getElementById('dangerText').innerHTML = `Bahaya! Beban Anda (${totalInstantWatt}W) terlalu berat untuk sistem 12V. Kabel berisiko panas. Gunakan Sistem 24V/48V!`;
            }

            // Update UI
            document.getElementById('resWh').innerText = finalWh.toLocaleString('id-ID') + " Wh";
            document.getElementById('resAh').innerText = ah + " Ah";
            document.getElementById('resWP').innerText = usedWP + " WP";
            document.getElementById('resDays').innerText = daysToCharge;
            document.getElementById('outText').textContent = (mode === "AC") ? "INVERTER" : "LOAD DC";
            document.getElementById('resKabel').innerText = `Saran Kabel: Min. ${Math.max(4, Math.ceil(sccAmp/4)*2.5)} mm²`;
            
            document.getElementById('daySub').innerText = usedWP < idealWP ? `PV Anda kecil. Butuh ~${daysToCharge} hari untuk mengisi penuh.` : "PV Ideal. Terisi penuh dalam 1 hari.";

            // Shopping List
            const list = [
                { n: `PV: ${usedWP} WP`, s: "Total panel surya yang digunakan" },
                { n: `Aki: ${ah} Ah ${volt}V`, s: `Jenis baterai yang dipilih` },
                { n: `SCC: ${sccAmp} Ampere`, s: "Gunakan tipe MPPT" }
            ];
            if (mode === "AC") list.push({ n: "Inverter PSW", s: "Pure Sine Wave Wajib" });
            list.push({ n: "MCB DC", s: "Pasang 2 unit untuk keamanan" });

            const listDiv = document.getElementById('shoppingList');
            listDiv.innerHTML = '';
            list.forEach(item => {
                listDiv.innerHTML += `<div class="p-3 bg-slate-50 rounded-xl border border-slate-100"><p class="font-bold text-slate-800 text-sm">${item.n}</p><p class="text-[9px] text-slate-400 font-black uppercase">${item.s}</p></div>`;
            });

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
