<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Kalkulator PLTS Mandiri - Hitung Panel Surya & Aki/Baterai Gratis</title>
    <meta name="description" content="Web tools gratis untuk menghitung kebutuhan PLTS secara akurat. Hitung Watt-Peak (WP), kapasitas baterai LiFePO4, dan spesifikasi inverter sesuai standar keamanan.">
    <meta name="keywords" content="kalkulator plts, hitung panel surya, hitung baterai lifepo4, skema plts, harga plts rumah">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .line-flow { stroke-dasharray: 5; animation: flow 2s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -10; } }
        .mcb-alert { animation: mcb-glow 1.5s infinite; }
        @keyframes mcb-glow { 0% { fill: #ef4444; } 50% { fill: #b91c1c; } 100% { fill: #ef4444; } }
        .saweria-float { position: fixed; bottom: 20px; right: 20px; z-index: 1000; transition: transform 0.3s; }
        .saweria-float:hover { transform: scale(1.1); }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-20 text-slate-900">

    <a href="https://saweria.co/rahmanerka" target="_blank" class="saweria-float bg-yellow-400 p-3 rounded-full shadow-2xl border-2 border-white flex items-center gap-2">
        <span class="text-xl">☕</span>
        <span class="text-[10px] font-black uppercase pr-2">Traktir Kopi</span>
    </a>

    <nav class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black tracking-tighter text-2xl uppercase text-yellow-400 leading-none">PLTS<span class="text-white">EXPERT</span></h1>
                <p class="text-[9px] text-slate-400 font-bold tracking-[0.2em] mt-1 uppercase text-center font-bold italic">Smart Calculator & Safety Guide</p>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 mt-8 grid lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">📋 Daftar Perangkat</h2>
                    <button onclick="addRow()" class="bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black hover:bg-yellow-500 transition-all">+ ALAT</button>
                </div>
                
                <div class="space-y-3 mb-6" id="loadContainer">
                    <div class="grid grid-cols-12 gap-2 load-row items-center border-b pb-3 border-slate-50">
                        <input type="text" placeholder="Nama Alat" class="col-span-5 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500">
                        <input type="number" placeholder="Watt" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold watt-val">
                        <input type="number" placeholder="Jam" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold hour-val">
                        <button onclick="this.parentElement.remove()" class="col-span-1 text-red-400 font-bold">×</button>
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-3 text-xs font-bold text-center">
                        <div class="space-y-1">
                            <label class="text-slate-400 uppercase">Sistem Arus</label>
                            <select id="modeInput" class="w-full p-4 bg-slate-900 text-white rounded-2xl outline-none">
                                <option value="AC">AC (Inverter)</option>
                                <option value="DC">DC (Full DC)</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-slate-400 uppercase">Voltase Baterai</label>
                            <select id="voltInput" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 outline-none">
                                <option value="12">12V</option>
                                <option value="24">24V</option>
                                <option value="48">48V</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 text-center block">Penyimpanan</label>
                        <select id="batteryType" class="w-full p-4 bg-blue-50 text-blue-700 rounded-2xl font-bold text-xs border border-blue-100 outline-none">
                            <option value="0.5">Aki GEL (DoD 50%)</option>
                            <option value="0.8">LiFePO4 (DoD 80%)</option>
                        </select>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                        <label class="block text-[10px] font-bold text-amber-700 uppercase mb-1">Punya PV? (Optional)</label>
                        <input type="number" id="customPV" placeholder="Kosongkan untuk Auto" class="w-full p-3 bg-white border border-amber-200 rounded-xl font-bold text-sm outline-none">
                    </div>

                    <button onclick="processSystem()" class="w-full bg-yellow-400 text-slate-900 font-black py-5 rounded-2xl hover:bg-slate-900 hover:text-white transition-all uppercase tracking-tighter shadow-xl">
                        Rancang Sistem ⚡
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div id="resultArea" class="hidden space-y-6 animate-in fade-in duration-700">
                
                <div id="dangerAlert" class="bg-red-600 text-white p-6 rounded-[2rem] flex items-start gap-4 hidden">
                    <span class="text-2xl">⚠️</span>
                    <p id="dangerText" class="text-sm font-bold"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 rounded-[2rem] p-6 text-white text-center">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Produksi Harian</p>
                        <h3 id="resWh" class="text-3xl font-black text-yellow-400 leading-none">0 Wh</h3>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-200 text-center">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Butuh Baterai</p>
                        <h3 id="resAh" class="text-3xl font-black text-blue-600 leading-none">0 Ah</h3>
                    </div>
                </div>

                <div id="inverterInfo" class="bg-blue-600 text-white p-5 rounded-[2.5rem] shadow-lg hidden">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Saran Inverter</p>
                    <h3 id="resInverter" class="text-xl font-black italic">0W Continuous</h3>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 text-center overflow-x-auto shadow-sm">
                    <svg viewBox="0 0 600 140" class="w-full min-w-[500px]">
                        <line x1="60" y1="70" x2="540" y2="70" stroke="#cbd5e1" stroke-width="2" class="line-flow"/>
                        <circle cx="60" cy="70" r="25" fill="#facc15"/><text x="60" y="73" font-size="8" font-weight="bold" text-anchor="middle">PV</text>
                        <circle cx="300" cy="70" r="25" fill="#1e293b"/><text x="300" y="73" font-size="8" font-weight="bold" text-anchor="middle" fill="white">SCC</text>
                        <circle cx="300" cy="120" r="20" fill="#2563eb"/><text x="300" y="123" font-size="8" font-weight="bold" text-anchor="middle" fill="white">BAT</text>
                        <circle cx="540" cy="70" r="25" fill="#9333ea"/><text x="540" y="73" font-size="8" font-weight="bold" text-anchor="middle" fill="white" id="outText">OUT</text>
                        <circle cx="180" cy="70" r="12" fill="#ef4444" class="mcb-alert"/><text x="180" y="73" font-size="7" fill="white" text-anchor="middle" font-weight="bold">MCB</text>
                        <circle cx="300" cy="95" r="10" fill="#ef4444" class="mcb-alert"/><text x="300" y="98" font-size="6" fill="white" text-anchor="middle" font-weight="bold">MCB</text>
                        <circle cx="420" cy="70" r="12" fill="#ef4444" class="mcb-alert"/><text x="420" y="73" font-size="7" fill="white" text-anchor="middle" font-weight="bold">MCB</text>
                    </svg>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <h3 class="font-black text-lg mb-4 text-center">🛒 Rekomendasi Belanja</h3>
                    <div id="shoppingList" class="grid gap-3"></div>
                </div>

                <div class="bg-slate-200 p-10 rounded-3xl text-center text-slate-400 text-xs font-bold border-2 border-dashed border-slate-300">
                    ADVERTISING SLOT
                </div>
            </div>

            <div id="placeholder" class="h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex items-center justify-center opacity-40 font-black text-slate-300 italic">
                INPUT DAFTAR ALAT DI KIRI
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN LINK AFFILIATE KAMU DI SINI
        const LINKS = {
            panel: "https://shope.ee/PANEL_SURYA_LINK",
            baterai: "https://shope.ee/BATERAI_LINK",
            scc: "https://shope.ee/SCC_LINK",
            inverter: "https://shope.ee/INVERTER_LINK",
            mcb: "https://shope.ee/MCB_LINK"
        };

        function addRow() {
            const container = document.getElementById('loadContainer');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-2 load-row items-center border-b pb-3 border-slate-50";
            row.innerHTML = `<input type="text" placeholder="Lampu" class="col-span-5 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500">
                             <input type="number" placeholder="W" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold watt-val">
                             <input type="number" placeholder="J" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold hour-val">
                             <button onclick="this.parentElement.remove()" class="col-span-1 text-red-400 font-bold">×</button>`;
            container.appendChild(row);
        }

        function processSystem() {
            const watts = document.querySelectorAll('.watt-val');
            const hours = document.querySelectorAll('.hour-val');
            let totalWhBase = 0; let instantWatt = 0;
            watts.forEach((w, i) => { 
                const vW = parseFloat(w.value) || 0;
                totalWhBase += vW * (parseFloat(hours[i].value) || 0);
                instantWatt += vW;
            });

            if (totalWhBase <= 0) return alert("Isi alat!");

            const mode = document.getElementById('modeInput').value;
            const volt = parseFloat(document.getElementById('voltInput').value);
            const dod = parseFloat(document.getElementById('batteryType').value);
            const customPV = parseFloat(document.getElementById('customPV').value) || 0;

            const finalWh = Math.ceil(totalWhBase * (mode === "AC" ? 1.15 : 1.05));
            const rawAh = Math.ceil(finalWh / (volt * dod));
            
            // Market Logic
            let marketAh = rawAh <= 20 ? 20 : rawAh <= 50 ? 50 : rawAh <= 100 ? 100 : Math.ceil(rawAh / 50) * 50;

            const idealWP = Math.ceil(finalWh / (4 * 0.85));
            const usedWP = customPV > 0 ? customPV : idealWP;
            const sccAmp = Math.ceil((usedWP / volt) * 1.25);
            const minInv = Math.ceil(instantWatt * 1.25);

            document.getElementById('resWh').innerText = finalWh.toLocaleString('id-ID') + " Wh";
            document.getElementById('resAh').innerText = rawAh + " Ah";
            document.getElementById('outText').textContent = mode === "AC" ? "INV" : "DC";

            if (mode === "AC") {
                document.getElementById('inverterInfo').classList.remove('hidden');
                document.getElementById('resInverter').innerText = minInv + "W Continuous";
            } else document.getElementById('inverterInfo').classList.add('hidden');

            // Render Shopping List with Affiliate Buttons
            const listDiv = document.getElementById('shoppingList');
            listDiv.innerHTML = '';
            
            const components = [
                { n: `Panel Surya ${usedWP} WP`, s: "Daftar total panel", l: LINKS.panel },
                { n: `Baterai ${rawAh} Ah`, s: rawAh < marketAh ? `Beli Kapasitas **${marketAh} Ah**` : "Cek Harga", l: LINKS.baterai },
                { n: `SCC MPPT ${sccAmp}A`, s: "Pengontrol Arus", l: LINKS.scc }
            ];
            if (mode === "AC") components.push({ n: `Inverter ${minInv}W`, s: "Tipe PSW", l: LINKS.inverter });
            components.push({ n: "Paket MCB & Arrester", s: "Keamanan Sistem", l: LINKS.mcb });

            components.forEach(item => {
                listDiv.innerHTML += `
                <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col items-center">
                    <p class="font-bold text-slate-800 text-sm">${item.n}</p>
                    <p class="text-[9px] text-slate-400 uppercase font-black mb-3">${item.s.replace(/\*\*(.*?)\*\*/g, '<span class="text-blue-600">$1</span>')}</p>
                    <a href="${item.l}" target="_blank" class="bg-[#ee4d2d] text-white text-[10px] font-black py-2 px-6 rounded-full hover:scale-105 transition-all uppercase tracking-tighter">Cek Harga Shopee</a>
                </div>`;
            });

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
