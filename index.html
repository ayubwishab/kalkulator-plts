<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTS Builder Pro - Energy Audit Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .line-flow { stroke-dasharray: 5; animation: flow 2s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -10; } }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen pb-20 text-slate-900">

    <nav class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black tracking-tighter text-2xl uppercase text-yellow-400">PLTS<span class="text-white">EXPERT</span></h1>
                <p class="text-[9px] text-slate-400 font-bold tracking-[0.2em]">PROFESSIONAL ENERGY AUDIT</p>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 mt-8 grid lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 flex justify-between items-center">
                    <span>📋 Daftar Perangkat Listrik</span>
                    <button onclick="addRow()" class="bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black hover:bg-yellow-500">+ TAMBAH ALAT</button>
                </h2>
                
                <div class="space-y-3 mb-6" id="loadContainer">
                    <div class="grid grid-cols-12 gap-2 load-row items-center border-b pb-3 border-slate-50">
                        <input type="text" placeholder="Nama Alat" class="col-span-5 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500">
                        <input type="number" placeholder="Watt" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500 watt-val">
                        <input type="number" placeholder="Jam" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500 hour-val">
                        <button onclick="this.parentElement.remove()" class="col-span-1 text-red-400 font-bold text-lg">×</button>
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Sistem Arus</label>
                            <select id="modeInput" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-bold text-xs outline-none">
                                <option value="AC">Sistem AC (Inverter)</option>
                                <option value="DC">Sistem DC (Direct)</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Voltase Aki</label>
                            <select id="voltInput" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs border border-slate-200 outline-none">
                                <option value="12">12V</option>
                                <option value="24">24V</option>
                                <option value="48">48V</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="calculateEverything()" class="w-full bg-yellow-400 text-slate-900 font-black py-5 rounded-2xl hover:bg-slate-900 hover:text-white transition-all uppercase tracking-tighter shadow-xl shadow-yellow-100">
                        Analisa Kebutuhan ⚡
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div id="resultArea" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                
                <div id="smartRec" class="bg-blue-600 text-white p-6 rounded-[2rem] shadow-lg flex items-start gap-4 hidden">
                    <span class="text-2xl">💡</span>
                    <div>
                        <p class="font-black uppercase text-[10px] tracking-widest mb-1 opacity-80 text-blue-200">Rekomendasi Hemat</p>
                        <p id="recText" class="text-sm font-bold leading-relaxed"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white relative overflow-hidden">
                        <p class="text-slate-500 text-[10px] font-bold uppercase mb-2">Total Kebutuhan Harian</p>
                        <h3 id="resWh" class="text-4xl font-black text-white italic">0 Wh</h3>
                        <div class="mt-4 inline-block bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">
                            Panel: <span id="resWP">0</span> WP
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-2">Estimasi Baterai</p>
                        <h3 id="resAh" class="text-4xl font-black text-blue-600">0 Ah</h3>
                        <p id="resKabel" class="text-[10px] mt-4 text-slate-400 font-bold italic"></p>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[3rem] border border-slate-200 shadow-sm">
                    <h3 class="font-black text-xl mb-6">🛒 Kebutuhan Perangkat</h3>
                    <div id="shoppingList" class="grid gap-3"></div>
                </div>
            </div>

            <div id="placeholder" class="h-full min-h-[400px] border-4 border-dashed border-slate-200 rounded-[3rem] flex items-center justify-center opacity-40">
                <div class="text-center">
                    <p class="text-5xl mb-4">📝</p>
                    <p class="font-black text-slate-400 uppercase tracking-widest text-sm italic">Isi daftar alat di samping</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addRow() {
            const container = document.getElementById('loadContainer');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-2 load-row items-center border-b pb-3 border-slate-50";
            row.innerHTML = `
                <input type="text" placeholder="Nama Alat" class="col-span-5 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500">
                <input type="number" placeholder="Watt" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500 watt-val">
                <input type="number" placeholder="Jam" class="col-span-3 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-yellow-500 hour-val">
                <button onclick="this.parentElement.remove()" class="col-span-1 text-red-400 font-bold text-lg">×</button>
            `;
            container.appendChild(row);
        }

        function calculateEverything() {
            const watts = document.querySelectorAll('.watt-val');
            const hours = document.querySelectorAll('.hour-val');
            let totalWh = 0;

            // 1. Hitung total Wh dari list
            watts.forEach((w, index) => {
                const valW = parseFloat(w.value) || 0;
                const valH = parseFloat(hours[index].value) || 0;
                totalWh += (valW * valH);
            });

            if (totalWh === 0) return alert("Silakan isi minimal satu perangkat!");

            const mode = document.getElementById('modeInput').value;
            const volt = parseFloat(document.getElementById('voltInput').value);
            
            // 2. Parameter Sesuai Permintaan (Matahari 4 Jam, Efisiensi 0.85)
            const sunHours = 4;
            const efficiency = 0.85;
            const lossFactor = (mode === "AC") ? 1.15 : 1.05;

            const finalWh = Math.ceil(totalWh * lossFactor);
            const wp = Math.ceil(finalWh / (sunHours * efficiency));
            const ah = Math.ceil(finalWh / (volt * 0.7)); // Default 0.7 (GEL)
            const sccAmp = Math.ceil((wp / volt) * 1.25);

            // 3. Rekomendasi Hemat Logic
            const recBox = document.getElementById('smartRec');
            const recText = document.getElementById('recText');
            recBox.classList.add('hidden');

            if (finalWh >= 1000 && volt == 12) {
                recBox.classList.remove('hidden');
                recText.innerHTML = "Beban Anda cukup besar (>1000Wh). Disarankan naik ke <b>Sistem 24V</b> untuk menghemat biaya kabel dan komponen SCC.";
            }

            // 4. Update UI
            document.getElementById('resWh').innerText = finalWh.toLocaleString('id-ID') + " Wh";
            document.getElementById('resWP').innerText = wp;
            document.getElementById('resAh').innerText = ah + " Ah";
            document.getElementById('resKabel').innerText = `Saran Kabel: Min. ${Math.ceil(sccAmp/4)||4} mm²`;

            // 5. Build Shopping List
            const list = [
                { n: `Panel Surya ${wp} WP`, s: "Minimal total kapasitas panel surya" },
                { n: `Baterai ${ah} Ah ${volt}V`, s: "Saran: Gunakan Deep Cycle GEL atau LiFePO4" },
                { n: `SCC MPPT ${sccAmp} Ampere`, s: "Pengontrol pengisian arus matahari" },
                { n: `MCB DC Breaker`, s: "Pengaman wajib (Pasang 2 unit)" }
            ];
            if (mode === "AC") list.push({ n: `Inverter PSW`, s: "Wajib tipe Pure Sine Wave" });

            const listDiv = document.getElementById('shoppingList');
            listDiv.innerHTML = '';
            list.forEach(item => {
                listDiv.innerHTML += `
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="font-bold text-slate-800 text-sm">${item.n}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${item.s}</p>
                    </div>
                `;
            });

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
